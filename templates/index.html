{% extends 'base.html' %}

{% block head %}
<title>LPG Knob & Flame Detector</title>
{% endblock %}

{% block body %}

<div class="page-content">

    <h1>LPG Knob & Flame Detector</h1>

    <h2>
        Prevent Gas Leaks by continuously monitoring your stove and flame
    </h2>

    <div class="button-group">
        <button onclick="startCamera()">Turn Camera On</button>
        <button onclick="stopCamera()">Turn Camera Off</button>
    </div>

    <video id="camera" autoplay playsinline muted></video>

    <canvas id="canvas" style="display:none;"></canvas>

    <p id="result">Camera is off</p>

</div>

<script>
const video = document.getElementById("camera");
const canvas = document.getElementById("canvas");
const result = document.getElementById("result");

let cameraStream = null;
let detectionInterval = null;
let isDetecting = false;

async function startCamera() {
    if (cameraStream) {
        return;
    }

    try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: { ideal: "environment" }
            },
            audio: false
        });

        video.srcObject = cameraStream;
        result.innerText = "Camera started";
        result.style.color = "white";
        result.style.fontSize = "1.5rem";

        detectionInterval = setInterval(() => {
            if (video.videoWidth > 0 && !isDetecting) {
                detectFrame();
            }
        }, 1500);

    } catch (err) {
        console.error(err);
        result.innerText = "Camera access denied";
        result.style.color = "red";
    }
}

function stopCamera() {
    if (cameraStream) {
        cameraStream.getTracks().forEach(track => track.stop());
        video.srcObject = null;
        cameraStream = null;
    }

    if (detectionInterval) {
        clearInterval(detectionInterval);
        detectionInterval = null;
    }

    isDetecting = false;

    result.innerText = "Camera is off";
    result.style.color = "white";
    result.style.fontSize = "1.5rem";
}

async function detectFrame() {
    isDetecting = true;

    try {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0);

        const imageData = canvas.toDataURL("image/jpeg", 0.7);

        const response = await fetch("/detect", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                image: imageData
            })
        });

        const data = await response.json();

        if (!response.ok) {
            result.innerText = data.message || "Server error";
            result.style.color = "red";
            return;
        }

        result.innerText = data.message;

        if (data.danger) {
            result.style.color = "red";
            result.style.fontSize = "3rem";
            result.style.fontWeight = "bold";
        } else {
            result.style.color = "white";
            result.style.fontSize = "1.5rem";
            result.style.fontWeight = "bold";
        }

    } catch (err) {
        console.error(err);
        result.innerText = "Detection failed";
        result.style.color = "red";
    } finally {
        isDetecting = false;
    }
}
</script>

{% endblock %}
